<!DOCTYPE html>
<html lang="en">
<head>
    <title>Nordic Security Handbook - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-modal">
        <div class="login-card">
            <div class="security-badge">🔐 SECURE ACCESS</div>
            <h1>Nordic<br><span>Security Handbook</span></h1>
            <p style="margin: 1rem 0 1.5rem; color: var(--text-muted);">Please sign in to access the internal security portal</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="signin-btn">Sign In</button>
            </form>
            
            <a href="#" class="forgot" id="forgotPassword">Forgot password?</a>
            <div class="warning-note">
                ⚠️ This is a secure internal system. Unauthorized access is prohibited.
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const forgotLink = document.getElementById('forgotPassword');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (username !== "" && password !== "") {
                sessionStorage.setItem('nordic_logged_in', 'true');
                sessionStorage.setItem('nordic_user', username);
                window.location.href = 'dashboard.html';
            } else {
                alert("Please enter both username and password to access the Nordic Security Handbook.");
            }
        });

        forgotLink.addEventListener('click', function(e) {
            e.preventDefault();
            alert("Please contact IT Security Support at security@company.com or call +1 (234) 567-890 to reset your credentials.");
        });
    </script>
</body>
</html>
