<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Nordic Security Handbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">
                    <img src="images/logo.svg" alt="Nordic logo">
                </div>
                <h1>Nordic</h1>
                <p>Security Handbook - Please sign in to access the internal security portal</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <a href="home.html">
                    <button type="button" class="primary-btn" style="width: 100%;">Sign In</button>
                </a>

                <div class="center-link">
                    <a href="#">Forgot password?</a>
                </div>

                <div class="warning-box">
                    This is a secure internal system. Unauthorized access is prohibited.
                </div>
            </form>
        </div>
    </div>
</body>
</html>
